<!DOCTYPE html>
<html lang="en">
<head>
    <!--The type of font we are using-->
    <meta charset="UTF-8">
    <!--Tells the -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Tyler Silvia">
    <meta name="description" content="Default HTML Page for SE 111">
    
    <link type="text/css" rel="stylesheet" href="style.css">

    <title>Week 5 | Tables and Forms</title>
</head>
<body>
   
    <h1>Birthday Party Registration Form</h1>

  
    <form method="GET" action="confirm.html">

        <table>
            <thead>
                <tr>
                    <td>Lables</td>
                    <td>Form Fields</td>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Parent / Guardian Information</td>
                </tr>

                <!--Parent/Guardian Name-->
                <tr>
                    <td>
                        <label for="gfirst">Parent/Guardian Name:</label>
                    </td>
                    <td>
                        <input type="text" required="" maxlength="20" name="gfirst" id="g-first" placeholder="First Name">
                        <br>
                        <input type="text" required="" maxlength="20" name="gfirst" id="g-first" placeholder="Last Name">
                    </td>
                </tr>

                <!--Child First Name-->

                <tr>
                    <td>
                        <label for="cfirst">Child's First Name:</label>
                    </td>
                    <td>
                        <input type="text" required="" name="cfirst" id="c-first" placeholder="Child's First Name">
                    </td>
                </tr>

                <!--Child Age-->

                <tr>
                    <td>
                        <label for="age">Child's Age:</label>
                    </td>
                    <td>
                        <input type="number" required="" name="age" value="3">
                    </td>
                </tr>

                <!--Date and Time-->
                <tr>
                    <td>Date and Time</td>
                </tr>

                <tr>
                    <td>
                        <label for="date">Date (mm/dd/yyyy):</label>
                    </td>
                    <td>
                        <input type="date" required="" name="date">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="time">Start Time:</label>
                    </td>
                    <td>
                        <input type="time" required="" name="time">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="guests">Number of Guests:</label>
                    </td>
                    <td>
                        <input type="number" name="guests" value="5">
                    </td>
                </tr>


                <tr>
                    <td>Food</td>
                </tr>

                <!-- Size -->
                <tr>
                    <td><label for="size">Size:</label></td>
                    <td>
                        <label><input type="radio" name="size" value="sm"> sm</label>
                        <label><input type="radio" name="size" value="med"> med</label>
                        <label><input type="radio" name="size" value="lrg"> lrg</label>
                    </td>
                </tr>

                <!-- Drinks -->
                <tr>
                    <td>Drinks:</td>
                    <td>
                        <label for="drink1"><input type="checkbox" name="drink" value="coke"> Coke</label>
                        <br>
                        <label for="drink2"><input type="checkbox" name="drink" value="sprite"> Sprite</label>
                        <br>
                        <label for="drink3"><input type="checkbox" name="drink" value="fruit punch"> Fruit Punch</label>
                        <br>
                        <label for="drink4"><input type="checkbox" name="drink" value="lemonade"> Lemonade</label>
                        <br>
                        <label for="drink5"><input type="checkbox" name="drink" value="iced tea"> Iced Tea</label>
                    </td>
                </tr>

                <!-- Cake -->
                <tr>
                    <td><label for="cake">Cake Flavor:</label></td>
                    <td>
                        <select id="cake" name="cake">
                            <option value="chocolate" selected="">Chocolate</option>
                            <option value="vanilla">Vanilla</option>
                            <option value="own">Ill Bring my own</option>
                        </select>
                    </td>
                </tr>

                <!--Decorations-->
                
                <tr>
                    <td>Decorations</td>
                </tr>

                <tr>
                    <td>
                        <label for="colors">Color Scheme:</label>
                    </td>
                    <td>
                        <input type="color" name="colors">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="comments">Additional Comments:</label>
                    </td>
                    <td>
                        <textarea name="comments" id="comments" placeholder="Please add any additional comments here"></textarea>
                    </td>
                </tr>

                <!-- Submit Button -->
                <tr>
                    <td>
                        <input type="submit" value="Submit">
                    </td>
                </tr>
            </tbody>
        </table>

    </form>





    
</body>
</html>
